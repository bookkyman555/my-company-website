
<!-- CONTACT -->
<section id="contact" class="section contact">
    <h2 class="section-title">Contact Us</h2>
    <p class="section-subtitle">
        Get in touch with our engineering team
    </p>

    <div class="contact-container">

        <!-- CONTACT INFO -->
        <div class="contact-info">
            <h3>RAVI TECH SYSTEMS</h3>

            <p>
                Factory Automation & System Integration
            </p>

            <ul>
                <li><strong>📍 Address:</strong> Bangkok, Thailand</li>
                <li><strong>📞 Phone:</strong> +66 81 709 9994</li>
                <li><strong>📧 Email:</strong>
                    ravitechsys.css.info@gmail.com</li>
            </ul>
        </div>

        <!-- CONTACT FORM -->
        <form class="contact-form" id="myContactForm">
            <input type="text" name="name" placeholder="Your Name" required />
            <input type="email" name="email" placeholder="Your Email"
                required />
            <input type="text" name="subject" placeholder="Subject" />
            <textarea name="message" placeholder="Message" rows="5"></textarea>
            <button id="submitBtn" type="submit">Send Message</button>
        </form>

    </div>
</section>
